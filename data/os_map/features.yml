global_guards:
  remediation_enabled:
    default: false
    required_for:
    - any file change
    - any package install or removal
    - any service enable disable restart reload
    - any bootloader update
    - any sysctl persistence change
  package_install_allowed:
    default: false
    required_for:
    - installing missing packages
    - updating packages
    - removing packages
  local_repository_defined:
    default: false
    required_for:
    - apt package installation
    - apt package upgrade
    - apt package removal where package metadata is needed
unknown_feature_policy:
  audit: allow read-only evidence collection when Astra distribution is detected and the version is candidate or unknown;
    report version_status explicitly
  remediation: block unless version is approved in required information and all remediation guards are true
  package_install: block unless package_install_allowed, local_repository_defined, remediation_enabled, maintenance window,
    and approval data are true
