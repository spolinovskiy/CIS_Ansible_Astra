---
- name: Passwords | Define chapter defaults and placeholders
  ansible.builtin.set_fact:
    cis_pw_login_defs_path: /etc/login.defs
    cis_pw_hashing_conf_candidates:
    - /etc/login.defs
    - /etc/pam.d/common-password
    cis_pw_approved_max_days: "{{ cis_pw_approved_max_days | default(365) }}"
    cis_pw_approved_min_days: "{{ cis_pw_approved_min_days | default(0) }}"
    cis_pw_approved_warn_days: "{{ cis_pw_approved_warn_days | default(7) }}"
    cis_pw_approved_inactive_days_max: "{{ cis_pw_approved_inactive_days_max | default(45) }}"
    cis_pw_approved_hash_algorithms: "{{ cis_pw_approved_hash_algorithms | default([]) }}"
    cis_pw_last_change_exceptions: "{{ cis_pw_last_change_exceptions | default([]) }}"
    cis_pw_missing_information_placeholders:
    - "MISSING_OT_BASELINE:approved_password_max_days"
    - "MISSING_OT_BASELINE:approved_password_min_days"
    - "MISSING_OT_BASELINE:approved_password_warn_days"
    - "MISSING_OT_BASELINE:approved_password_inactive_days_max"
    - "MISSING_OT_BASELINE:approved_password_hash_algorithms"
    - "MISSING_OT_BASELINE:approved_last_change_exceptions"
  changed_when: false
  tags: [cis, cis_5_4_1, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.1-5.4.1.3 | Collect login.defs aging settings
  ansible.builtin.shell: |
    grep -E '^[[:space:]]*(PASS_MAX_DAYS|PASS_MIN_DAYS|PASS_WARN_AGE)[[:space:]]+' "{{ cis_pw_login_defs_path }}" 2>/dev/null
  register: cis_5_4_1_1_3_login_defs_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_1, cis_5_4_1_2, cis_5_4_1_3, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.1-5.4.1.3 | Parse login.defs aging values
  ansible.builtin.set_fact:
    cis_pw_pass_max_days: "{{ (cis_5_4_1_1_3_login_defs_cmd.stdout | regex_search('(?m)^\\s*PASS_MAX_DAYS\\s+([0-9]+)\\s*$', '\\1') | first | default('0')) | int }}"
    cis_pw_pass_min_days: "{{ (cis_5_4_1_1_3_login_defs_cmd.stdout | regex_search('(?m)^\\s*PASS_MIN_DAYS\\s+([0-9]+)\\s*$', '\\1') | first | default('0')) | int }}"
    cis_pw_pass_warn_age: "{{ (cis_5_4_1_1_3_login_defs_cmd.stdout | regex_search('(?m)^\\s*PASS_WARN_AGE\\s+([0-9]+)\\s*$', '\\1') | first | default('0')) | int }}"
  changed_when: false
  tags: [cis, cis_5_4_1_1, cis_5_4_1_2, cis_5_4_1_3, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.1 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_1_evidence:
      login_defs_path: "{{ cis_pw_login_defs_path }}"
      pass_max_days: "{{ cis_pw_pass_max_days }}"
      approved_password_max_days: "{{ cis_pw_approved_max_days }}"
      command: "grep PASS_MAX_DAYS /etc/login.defs"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_password_max_days"]
    cis_5_4_1_1_result:
      control_id: "5.4.1.1"
      title: "Ensure password expiration is configured"
      status: "{{ 'pass' if (cis_pw_pass_max_days > 0 and cis_pw_pass_max_days <= (cis_pw_approved_max_days | int)) else 'fail' }}"
      reason: "{{ 'PASS_MAX_DAYS is configured within approved baseline' if (cis_pw_pass_max_days > 0 and cis_pw_pass_max_days <= (cis_pw_approved_max_days | int)) else 'PASS_MAX_DAYS is missing or outside approved baseline' }}"
  changed_when: false
  tags: [cis, cis_5_4_1_1, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.2 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_2_evidence:
      login_defs_path: "{{ cis_pw_login_defs_path }}"
      pass_min_days: "{{ cis_pw_pass_min_days }}"
      approved_password_min_days: "{{ cis_pw_approved_min_days }}"
      command: "grep PASS_MIN_DAYS /etc/login.defs"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_password_min_days"]
    cis_5_4_1_2_result:
      control_id: "5.4.1.2"
      title: "Ensure minimum password days is configured (Manual)"
      status: "{{ 'manual_review_required' if (cis_pw_pass_min_days >= (cis_pw_approved_min_days | int)) else 'fail' }}"
      reason: "{{ 'PASS_MIN_DAYS is configured and requires engineer baseline confirmation' if (cis_pw_pass_min_days >= (cis_pw_approved_min_days | int)) else 'PASS_MIN_DAYS is below approved baseline' }}"
  changed_when: false
  tags: [cis, cis_5_4_1_2, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.3 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_3_evidence:
      login_defs_path: "{{ cis_pw_login_defs_path }}"
      pass_warn_age: "{{ cis_pw_pass_warn_age }}"
      approved_password_warn_days: "{{ cis_pw_approved_warn_days }}"
      command: "grep PASS_WARN_AGE /etc/login.defs"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_password_warn_days"]
    cis_5_4_1_3_result:
      control_id: "5.4.1.3"
      title: "Ensure password expiration warning days is configured"
      status: "{{ 'pass' if (cis_pw_pass_warn_age >= (cis_pw_approved_warn_days | int)) else 'fail' }}"
      reason: "{{ 'PASS_WARN_AGE is configured within approved baseline' if (cis_pw_pass_warn_age >= (cis_pw_approved_warn_days | int)) else 'PASS_WARN_AGE is below approved baseline' }}"
  changed_when: false
  tags: [cis, cis_5_4_1_3, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.4 | Collect hashing algorithm evidence
  ansible.builtin.shell: |
    grep -R -E -- '^[[:space:]]*(ENCRYPT_METHOD|password[[:space:]].*pam_unix\.so.*(yescrypt|sha512|sha256))' {{ cis_pw_hashing_conf_candidates | join(' ') }} 2>/dev/null
  register: cis_5_4_1_4_hashing_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_4, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.4 | Parse hashing algorithms
  ansible.builtin.set_fact:
    cis_pw_detected_hash_algorithms: >-
      {{
        (
          (cis_5_4_1_4_hashing_cmd.stdout | regex_findall('(?i)\\byescrypt\\b'))
          + (cis_5_4_1_4_hashing_cmd.stdout | regex_findall('(?i)\\bsha512\\b'))
          + (cis_5_4_1_4_hashing_cmd.stdout | regex_findall('(?i)\\bsha256\\b'))
        ) | map('lower') | unique | list
      }}
  changed_when: false
  tags: [cis, cis_5_4_1_4, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.4 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_4_unapproved_algorithms: "{{ (cis_pw_detected_hash_algorithms | default([])) | difference(cis_pw_approved_hash_algorithms | default([])) }}"
    cis_5_4_1_4_evidence:
      detected_hash_algorithms: "{{ cis_pw_detected_hash_algorithms }}"
      approved_hash_algorithms: "{{ cis_pw_approved_hash_algorithms }}"
      unapproved_hash_algorithms: "{{ (cis_pw_detected_hash_algorithms | default([])) | difference(cis_pw_approved_hash_algorithms | default([])) }}"
      command: "grep ENCRYPT_METHOD and pam_unix hash args"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_password_hash_algorithms"]
    cis_5_4_1_4_result:
      control_id: "5.4.1.4"
      title: "Ensure strong password hashing algorithm is configured"
      status: "{{ 'fail' if (cis_pw_detected_hash_algorithms | length) == 0 else ('manual_review_required' if (cis_pw_approved_hash_algorithms | length) == 0 else ('pass' if ((cis_pw_detected_hash_algorithms | difference(cis_pw_approved_hash_algorithms | default([])) | length) == 0) else 'fail')) }}"
      reason: "{{ 'No password hashing algorithm evidence detected' if (cis_pw_detected_hash_algorithms | length) == 0 else ('Hashing algorithm evidence found; approved baseline is missing' if (cis_pw_approved_hash_algorithms | length) == 0 else ('Detected hashing algorithms match approved baseline' if ((cis_pw_detected_hash_algorithms | difference(cis_pw_approved_hash_algorithms | default([])) | length) == 0) else 'Detected hashing algorithms include unapproved values')) }}"
  changed_when: false
  tags: [cis, cis_5_4_1_4, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.5 | Collect inactive password lock value
  ansible.builtin.shell: |
    useradd -D 2>/dev/null | awk -F= '/^INACTIVE=/{print $2}'
  register: cis_5_4_1_5_inactive_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_5, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.5 | Parse inactive days
  ansible.builtin.set_fact:
    cis_pw_inactive_days: "{{ (cis_5_4_1_5_inactive_cmd.stdout | default('-1') | trim) | int }}"
  changed_when: false
  tags: [cis, cis_5_4_1_5, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.5 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_5_evidence:
      inactive_days: "{{ cis_pw_inactive_days }}"
      approved_inactive_days_max: "{{ cis_pw_approved_inactive_days_max }}"
      command: "useradd -D | awk /^INACTIVE=/"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_password_inactive_days_max"]
    cis_5_4_1_5_result:
      control_id: "5.4.1.5"
      title: "Ensure inactive password lock is configured"
      status: "{{ 'pass' if (cis_pw_inactive_days >= 0 and cis_pw_inactive_days <= (cis_pw_approved_inactive_days_max | int)) else 'fail' }}"
      reason: "{{ 'INACTIVE is configured within approved baseline' if (cis_pw_inactive_days >= 0 and cis_pw_inactive_days <= (cis_pw_approved_inactive_days_max | int)) else 'INACTIVE is not configured or outside approved baseline' }}"
  changed_when: false
  tags: [cis, cis_5_4_1_5, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.6 | Collect users with future last password change date
  ansible.builtin.shell: |
    awk -F: '($3 > 0){
      cmd = "date -u +%s"
      cmd | getline now
      close(cmd)
      if (($3 * 86400) > now) print $1":"$3
    }' /etc/shadow
  register: cis_5_4_1_6_future_change_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_6, passwords, chapter_passwords, astra, audit]

- name: 5.4.1.6 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_4_1_6_unapproved_future_change: "{{ (cis_5_4_1_6_future_change_cmd.stdout_lines | default([])) | difference(cis_pw_last_change_exceptions | default([])) }}"
    cis_5_4_1_6_evidence:
      future_last_password_change_entries: "{{ cis_5_4_1_6_future_change_cmd.stdout_lines | default([]) }}"
      approved_last_change_exceptions: "{{ cis_pw_last_change_exceptions }}"
      unapproved_future_last_password_change_entries: "{{ (cis_5_4_1_6_future_change_cmd.stdout_lines | default([])) | difference(cis_pw_last_change_exceptions | default([])) }}"
      command: "shadow lastchg date compared with current UTC date"
      missing_information_placeholders: ["MISSING_OT_BASELINE:approved_last_change_exceptions"]
    cis_5_4_1_6_result:
      control_id: "5.4.1.6"
      title: "Ensure all users last password change date is in the past"
      status: "{{ 'pass' if (cis_5_4_1_6_future_change_cmd.stdout_lines | default([]) | length) == 0 else ('manual_review_required' if (cis_pw_last_change_exceptions | length) == 0 else ('pass' if ((cis_5_4_1_6_future_change_cmd.stdout_lines | default([])) | difference(cis_pw_last_change_exceptions | default([])) | length) == 0 else 'fail')) }}"
      reason: "{{ 'No users with future last password change date found' if (cis_5_4_1_6_future_change_cmd.stdout_lines | default([]) | length) == 0 else ('Future last-change entries found; approved exception baseline is missing' if (cis_pw_last_change_exceptions | length) == 0 else ('Future last-change entries are covered by approved exceptions' if ((cis_5_4_1_6_future_change_cmd.stdout_lines | default([])) | difference(cis_pw_last_change_exceptions | default([])) | length) == 0 else 'Unapproved future last-change entries found')) }}"
  changed_when: false
  tags: [cis, cis_5_4_1_6, passwords, chapter_passwords, astra, audit]

- name: Passwords | Build chapter summary object
  ansible.builtin.set_fact:
    cis_passwords_chapter_summary:
      chapter_group: Passwords
      implemented_control_ids:
      - 5.4.1.1
      - 5.4.1.2
      - 5.4.1.3
      - 5.4.1.4
      - 5.4.1.5
      - 5.4.1.6
      results:
        "5.4.1.1": "{{ cis_5_4_1_1_result }}"
        "5.4.1.2": "{{ cis_5_4_1_2_result }}"
        "5.4.1.3": "{{ cis_5_4_1_3_result }}"
        "5.4.1.4": "{{ cis_5_4_1_4_result }}"
        "5.4.1.5": "{{ cis_5_4_1_5_result }}"
        "5.4.1.6": "{{ cis_5_4_1_6_result }}"
      evidence:
        "5.4.1.1": "{{ cis_5_4_1_1_evidence }}"
        "5.4.1.2": "{{ cis_5_4_1_2_evidence }}"
        "5.4.1.3": "{{ cis_5_4_1_3_evidence }}"
        "5.4.1.4": "{{ cis_5_4_1_4_evidence }}"
        "5.4.1.5": "{{ cis_5_4_1_5_evidence }}"
        "5.4.1.6": "{{ cis_5_4_1_6_evidence }}"
      missing_information_placeholders: "{{ cis_pw_missing_information_placeholders }}"
  changed_when: false
  tags: [cis, cis_5_4_1, passwords, chapter_passwords, astra, audit]
