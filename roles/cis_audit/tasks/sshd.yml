- name: 5.1.12 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_1_12_effective_kex_list: "{{ (cis_sshd_effective.kexalgorithms.split(',') if (cis_sshd_effective.kexalgorithms | length) > 0 else []) | map('trim') | reject('equalto','') | list }}"
    cis_5_1_12_unapproved_kex: "{{ (cis_sshd_effective.kexalgorithms.split(',') if (cis_sshd_effective.kexalgorithms | length) > 0 else []) | map('trim') | reject('equalto','') | list | difference(cis_sshd_approved_kex_algorithms | default([])) }}"
    cis_5_1_12_evidence:
      effective_kexalgorithms: "{{ cis_sshd_effective.kexalgorithms }}"
      approved_kex_baseline: "{{ cis_sshd_approved_kex_algorithms }}"
      missing_information_placeholders:
      - "MISSING_OT_BASELINE:approved_sshd_kex_algorithms"
    cis_5_1_12_result:
      control_id: "5.1.12"
      title: "Ensure sshd KexAlgorithms is configured"
      status: >-
        {% if (cis_sshd_effective.kexalgorithms | length) == 0 %}
        fail
        {% elif (cis_sshd_approved_kex_algorithms | length) == 0 %}
        manual_review_required
        {% elif (cis_5_1_12_unapproved_kex | length) == 0 %}
        pass
        {% else %}
        fail
        {% endif %}
      reason: >-
        {% if (cis_sshd_effective.kexalgorithms | length) == 0 %}
        Effective KexAlgorithms are not configured.
        {% elif (cis_sshd_approved_kex_algorithms | length) == 0 %}
        Effective KexAlgorithms detected, but approved KEX baseline is missing.
        {% elif (cis_5_1_12_unapproved_kex | length) == 0 %}
        Effective KexAlgorithms match approved baseline.
        {% else %}
        Effective KexAlgorithms include values outside approved baseline.
        {% endif %}
  changed_when: false
  tags: [cis, cis_5_1_12, sshd, chapter_sshd, astra, audit]

