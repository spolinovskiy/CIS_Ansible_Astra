    cis_3_3_9_evidence: "{{ cis_nkm_sysctl_result_map['3.3.9'].evidence }}"
    cis_3_3_10_evidence: "{{ cis_nkm_sysctl_result_map['3.3.10'].evidence }}"
    cis_3_3_11_evidence: "{{ cis_nkm_sysctl_result_map['3.3.11'].evidence }}"
  changed_when: false
  tags: [cis, cis_3_2, cis_3_3, network_kernel_modules, chapter_network_kernel_modules, astra, audit]

