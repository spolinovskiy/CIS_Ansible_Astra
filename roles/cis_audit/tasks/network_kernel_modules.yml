    cis_3_3_11_result: "{{ cis_nkm_sysctl_result_map['3.3.11'] }}"
    cis_3_2_1_evidence: "{{ cis_nkm_module_result_map['3.2.1'].evidence }}"
    cis_3_2_2_evidence: "{{ cis_nkm_module_result_map['3.2.2'].evidence }}"
    cis_3_2_3_evidence: "{{ cis_nkm_module_result_map['3.2.3'].evidence }}"
    cis_3_2_4_evidence: "{{ cis_nkm_module_result_map['3.2.4'].evidence }}"
    cis_3_3_1_evidence: "{{ cis_nkm_sysctl_result_map['3.3.1'].evidence }}"
    cis_3_3_2_evidence: "{{ cis_nkm_sysctl_result_map['3.3.2'].evidence }}"
