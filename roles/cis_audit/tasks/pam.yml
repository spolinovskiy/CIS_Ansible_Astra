- name: 5.3.3.1.1 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_3_3_1_1_evidence: "{{ cis_pam_pattern_map['5.3.3.1.1'] }}"
    cis_5_3_3_1_1_result:
