---
- name: PAM | Load Astra OS path map
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../data/os_map/paths.yml"
    name: cis_os_paths
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: PAM | Load Astra package map
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../data/os_map/packages.yml"
    name: cis_os_packages
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: PAM | Define chapter defaults
  ansible.builtin.set_fact:
    cis_pam_common_auth: "{{ cis_os_paths.paths.pam.common_auth | default('/etc/pam.d/common-auth') }}"
    cis_pam_common_account: "{{ cis_os_paths.paths.pam.common_account | default('/etc/pam.d/common-account') }}"
    cis_pam_common_password: "{{ cis_os_paths.paths.pam.common_password | default('/etc/pam.d/common-password') }}"
    cis_pam_common_session: "{{ cis_os_paths.paths.pam.common_session | default('/etc/pam.d/common-session') }}"
    cis_pam_faillock_conf: "{{ cis_os_paths.paths.pam.faillock_conf | default('/etc/security/faillock.conf') }}"
    cis_pam_pwquality_conf: "{{ cis_os_paths.paths.pam.pwquality_conf | default('/etc/security/pwquality.conf') }}"
    cis_pam_pwhistory_conf: "{{ cis_os_paths.paths.pam.pwhistory_conf | default('/etc/security/pwhistory.conf') }}"
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: PAM | Collect package facts
  ansible.builtin.package_facts:
    manager: auto
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: 5.3.1.1 | Collect installed pam package versions
  ansible.builtin.shell: |
    dpkg-query -W -f='${Package} ${Version}\n' 'pam' 'libpam0g' 2>/dev/null
  register: cis_5_3_1_1_pam_versions_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_3_1_1, pam, chapter_pam, astra, audit]

- name: 5.3.1.1 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_3_1_1_evidence:
      installed_versions: "{{ cis_5_3_1_1_pam_versions_cmd.stdout_lines }}"
      command: "dpkg-query -W -f='${Package} ${Version}' pam libpam0g"
      note: "Latest-version comparison baseline is temporary/default and requires environment-approved package baseline."
    cis_5_3_1_1_result:
      control_id: "5.3.1.1"
      title: "Ensure latest version of pam is installed"
      status: "{{ 'manual_review_required' if (cis_5_3_1_1_pam_versions_cmd.stdout_lines | length) > 0 else 'fail' }}"
      reason: "{{ 'PAM package detected; latest-version compliance requires environment-approved baseline' if (cis_5_3_1_1_pam_versions_cmd.stdout_lines | length) > 0 else 'PAM package version evidence not detected' }}"
  changed_when: false
  tags: [cis, cis_5_3_1_1, pam, chapter_pam, astra, audit]

- name: 5.3.1.2 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_3_1_2_evidence:
      package_present: "{{ 'libpam-modules' in (ansible_facts.packages | default({})) }}"
      package_versions: "{{ (ansible_facts.packages['libpam-modules'] | default([])) | map(attribute='version') | list }}"
      source: package_facts
    cis_5_3_1_2_result:
      control_id: "5.3.1.2"
      title: "Ensure libpam-modules is installed"
      status: "{{ 'pass' if ('libpam-modules' in (ansible_facts.packages | default({}))) else 'fail' }}"
      reason: "{{ 'libpam-modules package detected' if ('libpam-modules' in (ansible_facts.packages | default({}))) else 'libpam-modules package not detected' }}"
  changed_when: false
  tags: [cis, cis_5_3_1_2, pam, chapter_pam, astra, audit]

- name: 5.3.1.3 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_3_1_3_evidence:
      package_present: "{{ 'libpam-pwquality' in (ansible_facts.packages | default({})) }}"
      package_versions: "{{ (ansible_facts.packages['libpam-pwquality'] | default([])) | map(attribute='version') | list }}"
      source: package_facts
    cis_5_3_1_3_result:
      control_id: "5.3.1.3"
      title: "Ensure libpam-pwquality is installed"
      status: "{{ 'pass' if ('libpam-pwquality' in (ansible_facts.packages | default({}))) else 'fail' }}"
      reason: "{{ 'libpam-pwquality package detected' if ('libpam-pwquality' in (ansible_facts.packages | default({}))) else 'libpam-pwquality package not detected' }}"
  changed_when: false
  tags: [cis, cis_5_3_1_3, pam, chapter_pam, astra, audit]

- name: PAM | Collect module and argument evidence from PAM/config files
  ansible.builtin.shell: |
    grep -R -E -- '{{ item.pattern }}' {{ item.paths }} 2>/dev/null
  loop:
    - id: "5.3.2.1"
      pattern: "^[[:space:]]*(auth|account|password|session)[[:space:]].*pam_unix\\.so"
      paths: "{{ cis_pam_common_auth }} {{ cis_pam_common_account }} {{ cis_pam_common_password }} {{ cis_pam_common_session }}"
    - id: "5.3.2.2"
      pattern: "^[[:space:]]*(auth|account)[[:space:]].*pam_faillock\\.so"
      paths: "{{ cis_pam_common_auth }} {{ cis_pam_common_account }}"
    - id: "5.3.2.3"
      pattern: "^[[:space:]]*password[[:space:]].*pam_pwquality\\.so"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.2.4"
      pattern: "^[[:space:]]*password[[:space:]].*pam_pwhistory\\.so"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.1.1"
      pattern: "(^|[[:space:]])deny[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_faillock_conf }} {{ cis_pam_common_auth }}"
    - id: "5.3.3.1.2"
      pattern: "(^|[[:space:]])unlock_time[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_faillock_conf }} {{ cis_pam_common_auth }}"
    - id: "5.3.3.1.3"
      pattern: "(^|[[:space:]])even_deny_root([[:space:]]|$)|(^|[[:space:]])root_unlock_time[[:space:]]*="
      paths: "{{ cis_pam_faillock_conf }} {{ cis_pam_common_auth }}"
    - id: "5.3.3.2.1"
      pattern: "(^|[[:space:]])difok[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.2.2"
      pattern: "(^|[[:space:]])minlen[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.2.3"
      pattern: "(^|[[:space:]])(dcredit|ucredit|lcredit|ocredit)[[:space:]]*=[[:space:]]*-?[0-9]+"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.2.4"
      pattern: "(^|[[:space:]])maxrepeat[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.2.5"
      pattern: "(^|[[:space:]])maxsequence[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.2.6"
      pattern: "(^|[[:space:]])dictcheck[[:space:]]*=[[:space:]]*1"
      paths: "{{ cis_pam_pwquality_conf }}"
    - id: "5.3.3.2.7"
      pattern: "^[[:space:]]*password[[:space:]].*pam_pwquality\\.so"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.2.8"
      pattern: "(^|[[:space:]])enforce_for_root([[:space:]]|$)"
      paths: "{{ cis_pam_pwquality_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.3.1"
      pattern: "(^|[[:space:]])remember[[:space:]]*=[[:space:]]*[0-9]+"
      paths: "{{ cis_pam_pwhistory_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.3.2"
      pattern: "(^|[[:space:]])enforce_for_root([[:space:]]|$)"
      paths: "{{ cis_pam_pwhistory_conf }} {{ cis_pam_common_password }}"
    - id: "5.3.3.3.3"
      pattern: "^[[:space:]]*password[[:space:]].*pam_pwhistory\\.so.*\\buse_authtok\\b"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.4.1"
      pattern: "^[[:space:]]*password[[:space:]].*pam_unix\\.so"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.4.2"
      pattern: "^[[:space:]]*password[[:space:]].*pam_unix\\.so"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.4.3"
      pattern: "^[[:space:]]*password[[:space:]].*pam_unix\\.so.*\\b(yescrypt|sha512|sha256)\\b"
      paths: "{{ cis_pam_common_password }}"
    - id: "5.3.3.4.4"
      pattern: "^[[:space:]]*password[[:space:]].*pam_unix\\.so.*\\buse_authtok\\b"
      paths: "{{ cis_pam_common_password }}"
  register: cis_pam_pattern_evidence_cmd
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: PAM | Build pattern evidence map
  ansible.builtin.set_fact:
    cis_pam_pattern_map: "{{ (cis_pam_pattern_map | default({})) | combine({item.item.id: {'matched_lines': item.stdout_lines, 'rc': item.rc, 'pattern': item.item.pattern, 'paths': item.item.paths }}) }}"
  loop: "{{ cis_pam_pattern_evidence_cmd.results | default([]) }}"
  changed_when: false
  tags: [cis, cis_5_3, pam, chapter_pam, astra, audit]

- name: 5.3.2.1 | Build evidence and result
  ansible.builtin.set_fact:
    cis_5_3_2_1_evidence: "{{ cis_pam_pattern_map['5.3.2.1'] }}"
    cis_5_3_2_1_result:
      control_id: "5.3.2.1"
      title: "Ensure pam_unix module is enabled"
      status: "{{ 'pass' if (cis_pam_pattern_map['5.3.2.1'].matched_lines | length) > 0 else 'fail' }}"
      reason: "{{ 'pam_unix.so lines detected' if (cis_pam_pattern_map['5.3.2.1'].matched_lines | length) > 0 else 'pam_unix.so lines not detected' }}"
  changed_when: false
  tags: [cis, cis_5_3_2_1, pam, chapter_pam, astra, audit]

